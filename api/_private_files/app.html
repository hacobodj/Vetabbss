<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plataforma BBSS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<style>
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  background:linear-gradient(135deg,#0057a0 0%,#0067ac 60%,#0080cc 100%);
  font-family:'Segoe UI',Arial,Helvetica,sans-serif;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
}
.wrap{
  width:min(420px,88vw);
  text-align:center;
}
h1{
  margin:0 0 32px;
  font-size:30px;
  font-weight:800;
  letter-spacing:-.5px;
}
.buttons{
  display:grid;
  gap:12px;
}
a{
  height:68px;
  border-radius:14px;
  background:#fff;
  text-decoration:none;
  display:flex;
  align-items:center;
  gap:16px;
  padding:0 20px;
  transition:.15s;
  box-shadow:0 4px 14px rgba(0,0,0,.14);
}
a:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 26px rgba(0,0,0,.22);
}
.icon-wrap{
  width:38px;
  height:38px;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:17px;
  flex-shrink:0;
  color:#fff;
}
.ic-prov{ background:linear-gradient(135deg,#2563eb,#1d4ed8); }
.ic-log { background:linear-gradient(135deg,#059669,#065f46); }
.ic-comp{ background:linear-gradient(135deg,#7c3aed,#4c1d95); }
.label-wrap{ display:flex; flex-direction:column; gap:2px; text-align:left; flex:1; }
.label-main{ font-size:14px; font-weight:800; color:#111827; }
.label-sub{ font-size:11px; font-weight:500; color:#6b7280; }
.arrow{ color:#d1d5db; font-size:12px; flex-shrink:0; }
</style>
</head>
<body>
  <main class="wrap">
    <h1>Plataforma BBSS</h1>
    <div class="buttons">
      <a href="/portal/proveedor">
        <span class="icon-wrap ic-prov"><i class="fa-solid fa-building"></i></span>
        <span class="label-wrap">
          <span class="label-main">Proveedor</span>
          <span class="label-sub">Portal de documentación y seguimiento</span>
        </span>
        <i class="fa-solid fa-chevron-right arrow"></i>
      </a>
      <a href="/portal/logistica">
        <span class="icon-wrap ic-log"><i class="fa-solid fa-truck"></i></span>
        <span class="label-wrap">
          <span class="label-main">Logística</span>
          <span class="label-sub">Gestión de operaciones logísticas</span>
        </span>
        <i class="fa-solid fa-chevron-right arrow"></i>
      </a>
      <a href="/portal/compliance">
        <span class="icon-wrap ic-comp"><i class="fa-solid fa-clipboard-check"></i></span>
        <span class="label-wrap">
          <span class="label-main">Compliance</span>
          <span class="label-sub">Control y validación de cumplimiento</span>
        </span>
        <i class="fa-solid fa-chevron-right arrow"></i>
      </a>
    </div>
  </main>
</body>
</html>
