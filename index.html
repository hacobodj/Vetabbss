<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access PortalBBSS</title>
  <link rel="icon" type="image/x-icon" href="https://vetadorada.vercel.app/static/Veta.ico">
  <link rel="shortcut icon" href="https://vetadorada.vercel.app/static/Veta.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --blue:#005fa3;
      --blue-dark:#0b4d82;
      --blue-deep:#0f3556;
      --gold:#d2a12a;
      --panel:#ffffff;
      --line:#d4e0ea;
      --text:#183047;
      --muted:#6f8092;
      --bg-1:#fbfdff;
      --bg-2:#eef4f9;
      --shadow:0 16px 34px rgba(18,54,86,.08);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:"DM Sans","Segoe UI",Tahoma,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 50% 52%, rgba(0,95,163,.09), transparent 18%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.9), transparent 44%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
      display:grid;
      place-items:center;
      padding:24px;
    }
    .login-shell{
      width:min(100%, 360px);
      padding:0;
    }
    .login-card{
      background:#ffffff;
      border:1px solid var(--line);
      border-radius:10px;
      padding:20px 18px 18px;
      box-shadow:var(--shadow);
    }
    .brand{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      margin-bottom:14px;
    }
    .brand-logo{
      width:38px;
      height:38px;
      object-fit:contain;
      display:block;
      flex:0 0 38px;
    }
    .brand-text{
      font-size:18px;
      font-weight:800;
      color:var(--blue);
      letter-spacing:-.035em;
      line-height:1;
    }
    .subtitle{
      margin:0 0 14px;
      text-align:center;
      color:var(--muted);
      font-size:13px;
      font-weight:500;
      letter-spacing:-.01em;
    }
    .field{
      display:flex;
      flex-direction:column;
      gap:0;
    }
    .input{
      width:100%;
      height:40px;
      border:1px solid #cdd9e4;
      background:#ffffff;
      border-radius:10px;
      padding:0 14px;
      font-size:13px;
      font-weight:400;
      color:var(--blue-deep);
      outline:none;
      transition:border-color .18s ease, box-shadow .18s ease;
    }
    .input::placeholder{
      color:#8a98a8;
      font-weight:400;
    }
    .input:focus{
      border-color:#9bbfdb;
      box-shadow:0 0 0 3px rgba(0,95,163,.08);
    }
    .actions{
      margin-top:10px;
    }
    .button{
      width:100%;
      height:40px;
      border:none;
      border-radius:10px;
      background:linear-gradient(180deg, #126fb3 0%, #005fa3 100%);
      color:#fff;
      font-size:13px;
      font-weight:800;
      letter-spacing:0;
      cursor:pointer;
      transition:filter .16s ease, box-shadow .16s ease;
      box-shadow:0 8px 18px rgba(0,95,163,.14);
    }
    .button:hover{
      filter:brightness(1.01);
      box-shadow:0 10px 20px rgba(0,95,163,.16);
    }
    .button:active{filter:brightness(.99)}
    .button[disabled]{cursor:wait;opacity:.8}
    .message{
      min-height:18px;
      margin-top:8px;
      text-align:center;
      font-size:12px;
      color:#b23b3b;
    }
    @media (max-width: 640px){
      .login-shell{width:min(100%, 340px)}
      .login-card{padding:18px 16px 16px}
      .brand-logo{width:36px;height:36px;flex-basis:36px}
      .brand-text{font-size:17px}
      .subtitle{font-size:12px}
      .input{height:38px}
      .button{height:38px}
    }
  </style>
</head>
<body>
  <div class="login-shell">
    <div class="login-card">
      <div class="brand">
        <img class="brand-logo" src="https://vetadorada.vercel.app/static/Veta.ico" alt="Veta Dorada">
        <div class="brand-text">VetaDorada</div>
      </div>
      <p class="subtitle">Private access to the PortalBBSS mockup</p>
      <form id="loginForm">
        <div class="field">
          <input id="pinInput" class="input" type="password" name="pin" placeholder="Enter PIN" autocomplete="current-password" required>
        </div>
        <div class="actions">
          <button id="loginButton" class="button" type="submit">Enter</button>
        </div>
        <div id="message" class="message" aria-live="polite"></div>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const input = document.getElementById('pinInput');
    const button = document.getElementById('loginButton');
    const message = document.getElementById('message');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      message.textContent = '';
      button.disabled = true;
      button.textContent = 'Validating...';

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pin: input.value })
        });

        if (!response.ok) {
          const data = await response.json().catch(() => ({}));
          throw new Error(data.error || 'No se pudo validar el PIN.');
        }

        window.location.href = '/app';
      } catch (error) {
        message.textContent = error.message || 'PIN incorrecto.';
        input.select();
      } finally {
        button.disabled = false;
        button.textContent = 'Enter';
      }
    });
  </script>
</body>
</html>
